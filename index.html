<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ishal major</title>
    <meta name="description" content="Explore a collection of traditional Mappila song lyrics with high-quality audio.">
    <link rel="icon" type="image/x-icon" href="major logo.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #007bbd;
            --bg-color: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(0, 107, 189, 0.85); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            padding: 8px 0;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            box-sizing: border-box;
            position: relative;
        }

        .logo-area {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            flex-shrink: 0;
        }

        .logo-container {
            width: 36px;
            height: 36px;
            background-color: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            overflow: hidden;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            margin-left: auto;
            margin-right: 10px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            cursor: pointer;
        }

        .search-box.active {
            width: 220px;
            padding: 0 12px;
            background: rgba(255, 255, 255, 0.25);
        }

        .search-input {
            border: none;
            background: transparent;
            color: white;
            width: 0;
            opacity: 0;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-box.active .search-input {
            width: 100%;
            opacity: 1;
            padding-left: 8px;
        }

        .search-icon {
            background: none;
            border: none;
            min-width: 34px;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            padding: 5px;
        }

        .hamburger span {
            width: 25px; height: 3px; background-color: white; border-radius: 2px;
        }

        nav ul {
            list-style: none; display: flex; gap: 15px; margin: 0; padding: 0;
        }

        nav a {
            color: white; text-decoration: none; font-size: 14px; font-weight: 500;
        }

        .container {
            max-width: 600px; width: 100%; margin: 20px auto; padding: 0 15px; box-sizing: border-box;
        }

        .song-card {
            background: white; padding: 18px; margin-bottom: 12px; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }

        .song-card:hover {
            transform: translateY(-3px); border-color: var(--primary-blue);
        }

        .lyrics-display {
            display: none; background: white; padding: 25px 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
        }

        .audio-section {
            background-color: #222; background-size: cover; background-position: center;
            width: 100%; aspect-ratio: 16/9; border-radius: 15px; margin-bottom: 20px;
            position: relative; display: flex; flex-direction: column; justify-content: flex-end;
            overflow: hidden; border: 1px solid #ddd;
        }

        .audio-container { width: 100%; padding: 15px; background: linear-gradient(transparent, black); }

        audio { width: 100%; }

        #songContent { white-space: pre-wrap; line-height: 1.8; color: #1a1a1a; font-weight: 500; }

        .info-box {
            margin-bottom: 20px; padding: 15px; background: #f8fbff;
            border-radius: 10px; border-left: 5px solid var(--primary-blue);
        }

        @media (max-width: 600px) {
            .hamburger { display: flex; }
            nav { display: none; }
            nav.active { display: block; position: absolute; top: 100%; right: 0; width: 100%; background: var(--primary-blue); text-align: center; padding: 20px 0; }
            nav ul { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <a href="#" onclick="goBack()" class="logo-area">
            <div class="logo-container">
                <img src="major logo.ico" alt="Logo" onerror="this.parentElement.innerHTML='🎵'">
            </div>
            <h1 class="header-title">ishal major</h1>
        </a>

        <div class="search-container">
            <div class="search-box" id="searchBox" onclick="toggleSearch(event)">
                <button class="search-icon" id="searchBtn">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Song, Singer, Lyrics..." onkeyup="searchSongs()" onclick="event.stopPropagation()">
            </div>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        
        <nav id="navbar">
            <ul>
                <li><a href="#" onclick="goBack()">Home</a></li>
                <li><a href="tel:9946170854">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="container">
    <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none; margin-bottom:15px; padding:8px 15px; border-radius:20px; border:1px solid #ccc; background:white; cursor:pointer;">← Back</button>
    <div id="mainView"><div id="songList"></div></div>
    <div id="lyricsView" class="lyrics-display">
        <div class="audio-section" id="audioBg"><div class="audio-container"><audio id="audioPlayer" controls><source id="audioSource" src="" type="audio/mpeg"></audio></div></div>
        <div id="songContent"></div>
    </div>
</div>

        },
        {
            title: "തരം യെണ്ട്",
            audio: "tharyend.mp3",
            image: "tharam.jpg", 
            ishal: "ഇശൽ: അടൽ ഫൊരുദ് ചെറുനീട്ട്",
            lyricsBy: "Lyrics: Moyin Kutty Vaidyar",
            musicBy: "Music: haneefa mudikkode",
            singer: "singer: shadin malappuram",
            content: `തരം യെണ്ടുറച്ചവൻ ബിരുത്താനേ ജനർകളെ 
ഫകുത്താനേ വഹ്‌ശിയും അടുത്താനേ

സമയത്തിൽ ഫുലീ ഹംസ ഇടയ‌നോരാം ഫടകൊടു
തളർന്ദോരാം കുനിവിലേ നിലയന്ദോരാം

    function toggleSearch(e) {
        const box = document.getElementById('searchBox');
        const input = document.getElementById('searchInput');
        box.classList.add('active');
        input.focus();
    }

    document.addEventListener('click', (e) => {
        const box = document.getElementById('searchBox');
        const input = document.getElementById('searchInput');
        if (!box.contains(e.target) && input.value.trim() === "") {
            box.classList.remove('active');
        }
    });

    function searchSongs() {
        const rawInput = document.getElementById('searchInput').value;
        // Trim and replace multiple spaces with a single space
        const filter = rawInput.trim().toLowerCase().replace(/\s+/g, ' ');
        
        const songListDiv = document.getElementById('songList');
        songListDiv.innerHTML = '';
        
        let hasResults = false;
        songs.forEach((song, index) => {
            // Search in Title, Singer, Lyrics, and Music fields
            const searchableText = `${song.title} ${song.singer} ${song.lyricsBy} ${song.musicBy}`.toLowerCase();
            
            if (searchableText.includes(filter)) {
                hasResults = true;
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `<h3>${song.title}</h3><small style="color:#666">${song.singer}</small>`;
                card.onclick = () => showLyrics(index);
                songListDiv.appendChild(card);
            }
        });

        if (!hasResults) {
            songListDiv.innerHTML = '<p style="text-align:center; padding:20px;">No results found.</p>';
        }
    }

    function showLyrics(index) {
        const song = songs[index];
        document.getElementById('audioBg').style.backgroundImage = `url('${song.image}')`;
        document.getElementById('audioSource').src = song.audio;
        document.getElementById('audioPlayer').load();
        
        document.getElementById('songContent').innerHTML = `
            <div class="info-box">
                <div style="color:var(--primary-blue); font-weight:bold">${song.ishal}</div>
                <div>${song.lyricsBy}</div>
                <div>${song.musicBy}</div>
                <div>${song.singer}</div>
            </div>
            ${song.content}
        `;
        
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        window.scrollTo(0,0);
    }

    function goBack() {
        document.getElementById('audioPlayer').pause();
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('lyricsView').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
    }

    function toggleMenu() { document.getElementById('navbar').classList.toggle('active'); }

    window.onload = () => displaySongs();
    function displaySongs() { searchSongs(); }
</script>
</body>
</html>
