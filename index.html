<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ishal major</title>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #007bbd;
            --bg-color: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(0, 107, 189, 0.85); 
            backdrop-filter: blur(10px) brightness(90%);
            -webkit-backdrop-filter: blur(10px) brightness(90%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            padding: 8px 0;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .logo-area {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: opacity 0.3s ease;
        }

        .logo-container {
            width: 35px;
            height: 35px;
            background-color: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 10px;
            overflow: hidden;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 0;
        }

        /* Search Box Styles */
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 5px 10px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .search-input {
            border: none;
            background: transparent;
            color: white;
            width: 0;
            opacity: 0;
            outline: none;
            font-size: 14px;
            transition: all 0.4s ease;
        }

        .header-content.search-active .search-input {
            width: 180px; /* മൊബൈലിൽ ഇതിലും കുറവ് നൽകാം */
            opacity: 1;
            padding: 0 5px;
        }

        .header-content.search-active .logo-area {
            display: none;
        }

        .header-content.search-active .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.25);
        }

        .search-icon {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 5px;
        }

        .search-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .close-search {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding-left: 10px;
        }

        .header-content.search-active .close-search {
            display: block;
        }

        /* ... (നിങ്ങളുടെ മറ്റു CSS സ്റ്റൈലുകൾ ഇവിടെ താഴെ ചേർക്കുക) ... */
        .container { max-width: 600px; width: 100%; margin: 20px auto; padding: 0 15px; box-sizing: border-box; min-height: 80vh; }
        .song-card { background: #fff; padding: 18px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
        .lyrics-display { display: none; background: #fff; padding: 25px 20px; border-radius: 15px; }
        .back-btn { display: none; margin-bottom: 15px; padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .audio-section { width: 100%; aspect-ratio: 16/9; border-radius: 15px; background-size: cover; margin-bottom: 20px; position: relative; }
        .audio-container { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); box-sizing: border-box; }
        audio { width: 100%; }
        .info-box { background: #f8fbff; padding: 15px; border-left: 5px solid var(--primary-blue); margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <div class="header-content" id="headerContent">
        <a href="#" onclick="goBack()" class="logo-area">
            <div class="logo-container">
                <img src="major logo.ico" alt="Logo" onerror="this.parentElement.innerHTML='🎵'">
            </div>
            <h1 class="header-title">ishal major</h1>
        </a>

        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="പാട്ടുകൾ തിരയുക..." onkeyup="searchSongs()">
            <button class="search-icon" onclick="openSearch()" aria-label="Search">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <button class="close-search" onclick="closeSearch()">✕</button>
        </div>
    </div>
</header>

<div class="container">
    <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
    
    <div id="mainView">
        <div id="songList"></div>
    </div>

    <div id="lyricsView" class="lyrics-display">
        <div class="audio-section" id="audioBg">
            <div class="audio-container">
                <audio id="audioPlayer" controls>
                    <source id="audioSource" src="" type="audio/mpeg">
                </audio>
            </div>
        </div>
        <div id="songContent"></div>
    </div>
</div>

<script>
    // ... (നിങ്ങളുടെ songs അറേ ഇവിടെ നിലനിർത്തുക) ...
    const songs = [
        {
            title: "ശുജായി തറവാട്ടിലെ",
            audio: "shujayi.mp3",
            image: "shujayi.jpg",
            ishal: "ഇശൽ: ഓശാകൾ ഇടമുറുക്കം",
            lyricsBy: "Lyrics: Hamza Narokkavu",
            musicBy: "Music: Haneefa Mudikkode",
            singer: "Singer: Yumna Ajin",
            content: `ശുജായി തറവാട്ടിലെ ചിന്ത മികന്തൊരു ചൊങ്കരലംങ്കൃത തങ്കം... (മുഴുവൻ വരികൾ)`
        },
        // മറ്റു പാട്ടുകൾ...
    ];

    const headerContent = document.getElementById('headerContent');
    const searchInput = document.getElementById('searchInput');

    function openSearch() {
        headerContent.classList.add('search-active');
        searchInput.focus();
    }

    function closeSearch() {
        headerContent.classList.remove('search-active');
        searchInput.value = '';
        displaySongs();
    }

    function displaySongs(filter = "") {
        const list = document.getElementById('songList');
        list.innerHTML = '';
        songs.forEach((song, index) => {
            if (song.title.toLowerCase().includes(filter.toLowerCase())) {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `<h3>${song.title}</h3>`;
                card.onclick = () => showLyrics(index);
                list.appendChild(card);
            }
        });
    }

    function searchSongs() {
        displaySongs(searchInput.value);
    }

    function showLyrics(index) {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        
        const song = songs[index];
        document.getElementById('audioBg').style.backgroundImage = `url(${song.image})`;
        document.getElementById('audioSource').src = song.audio;
        document.getElementById('audioPlayer').load();
        
        document.getElementById('songContent').innerHTML = `
            <div class="info-box">
                <p><b>${song.ishal}</b></p>
                <p>${song.singer}</p>
            </div>
            <pre style="white-space: pre-wrap;">${song.content}</pre>
        `;
    }

    function goBack() {
        document.getElementById('audioPlayer').pause();
        document.getElementById('mainView').style.display = 'block';
        document.getElementById('lyricsView').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
    }

    window.onload = () => displaySongs();
</script>

</body>
</html>
