نَتَهَنَّى كُلَّ صَلَاحًا-صَلَاحًا`
        },
    ];

    const songListDiv = document.getElementById('songList');
    const mainView = document.getElementById('mainView');
    const lyricsView = document.getElementById('lyricsView');
    const backBtn = document.getElementById('backBtn');
    const audioPlayer = document.getElementById('audioPlayer');
    const audioSource = document.getElementById('audioSource');
    const audioBg = document.getElementById('audioBg');
    const songContent = document.getElementById('songContent');
    const songDescription = document.getElementById('songDescription');

    // Navigation and Footer Logic
    function initFooterAndNav() {
        document.getElementById('currentYear').innerText = new Date().getFullYear();
    }

    function toggleMenu() {
        const navbar = document.getElementById('navbar');
        const hamburger = document.getElementById('hamburger');
        navbar.classList.toggle('active');
        hamburger.classList.toggle('active');
    }

    function closeMenu() {
        const navbar = document.getElementById('navbar');
        const hamburger = document.getElementById('hamburger');
        navbar.classList.remove('active');
        hamburger.classList.remove('active');
    }

    function showAbout() {
        alert("Ishal Major - A digital platform for traditional Mappila Songs lyrics and audio.\nContact: 9946170854");
    }

    function displaySongs() {
        songListDiv.innerHTML = '';
        songs.forEach((song, index) => {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.innerHTML = `<h3>${song.title}</h3>`;
            card.onclick = () => showLyrics(index);
            songListDiv.appendChild(card);
        });
    }

    function showLyrics(index) {
        audioBg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${songs[index].image}')`;

        const songDetails = `
            <div class="info-box">
                <div style="color: #007bbd; font-weight: bold; margin-bottom: 5px;">${songs[index].ishal || 'ഇശൽ'}</div>
                <div style="color: #444;"><b>${songs[index].lyricsBy}</b></div>
                <div style="color: #444;"><b>${songs[index].musicBy}</b></div>
                <div style="color: #444;"><b>${songs[index].singer}</b></div>
            </div>
        `;

        songContent.innerHTML = songDetails + songs[index].content;
        songDescription.innerText = songs[index].description;

        const placeholder = document.getElementById('adPlaceholder');
        placeholder.innerHTML = '';
        const adContainer = document.createElement('div');
        adContainer.style.marginTop = "30px";
        adContainer.style.display = "flex";
        adContainer.style.overflowX = "auto"; 
        adContainer.style.gap = "15px";
        adContainer.style.paddingBottom = "15px";

        function createAdBox(imgSrc, affiliateLink, btnText) {
            const box = document.createElement('div');
            box.style.border = "1px solid #eee";
            box.style.borderRadius = "10px";
            box.style.padding = "15px";
            box.style.flex = "0 0 170px"; 
            box.style.textAlign = "center";
            box.style.backgroundColor = "#fff";
            box.style.boxShadow = "0 2px 5px rgba(0,0,0,0.05)";

            const img = document.createElement('img');
            img.src = imgSrc;
            img.style.width = "100%";
            img.style.height = "120px";
            img.style.objectFit = "contain";
            img.style.marginBottom = "10px";

            const btn = document.createElement('a');
            btn.href = affiliateLink;
            btn.target = "_blank";
            btn.innerText = btnText;
            btn.style.display = "block";
            btn.style.padding = "8px";
            btn.style.backgroundColor = "#007bbd";
            btn.style.color = "white";
            btn.style.textDecoration = "none";
            btn.style.borderRadius = "5px";
            btn.style.fontSize = "13px";
            btn.style.fontWeight = "600";

            box.appendChild(img);
            box.appendChild(btn);
            return box;
        }

        adContainer.appendChild(createAdBox("https://m.media-amazon.com/images/I/61jFCPzQpvL._AC_UL320_.jpg", "https://amzn.in/d/094b81Na", "Buy V8 Sound Card"));
        adContainer.appendChild(createAdBox("https://m.media-amazon.com/images/I/41xh90fXdAL._SY300_SX300_QL70_FMwebp_.jpg", "https://amzn.in/d/0fUZKAHx", "Karaoke Speaker"));
        adContainer.appendChild(createAdBox("https://images-eu.ssl-images-amazon.com/images/I/61C7uYbrI9L._AC_UL165_SR165,165_.jpg", "https://amzn.in/d/09ZSgjsC", "Karaoke Microphone"));
        placeholder.appendChild(adContainer);

        audioSource.src = songs[index].audio;
        audioPlayer.load();

        mainView.style.display = 'none';
        lyricsView.style.display = 'block';
        backBtn.style.display = 'inline-block';
        window.scrollTo(0,0);
    }

    function goBack() {
        audioPlayer.pause(); 
        mainView.style.display = 'block';
        lyricsView.style.display = 'none';
        backBtn.style.display = 'none';
        window.scrollTo(0,0);
    }

    // Run initializations
    window.onload = function() {
        initFooterAndNav();
        displaySongs();
    };
</script>

</body>
</html>
